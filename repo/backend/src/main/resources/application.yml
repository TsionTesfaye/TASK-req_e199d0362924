spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rescuehub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:rescue}
    password: ${SPRING_DATASOURCE_PASSWORD:rescuepw}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    deserialization:
      # Reject unknown request fields so snake_case / legacy payloads don't silently map.
      fail-on-unknown-properties: true

server:
  port: 8080

rescuehub:
  storage:
    dir: ${RESCUEHUB_STORAGE_DIR:/storage}
  crypto:
    # NO default. Application refuses to start unless ENCRYPTION_KEY is set.
    key: ${ENCRYPTION_KEY:}

logging:
  level:
    com.rescuehub: INFO
    org.flywaydb: INFO
